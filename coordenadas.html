<div id="login-msg">
    <span>Faça login para enviar coordenadas</span>
    <a id="login-a" href="#" data-link="cadastro.html" onclick="loadPage('cadastro.html')">Login</a>
  </div>
  
  
  <form action="#" method="post" id="form-arvore" class="form-container" style="display: none;">
    <h2>Coordenadas</h2>
  
    <div class="form-group">
      <label for="name">Nome:</label>
      <input type="text" id="nome" placeholder="Digite seu nome (opcional)" required>
    </div>
    
    <div class="form-group">
      <label for="curso">Curso:</label>
      <select id="curso" required>
        <option value="" disabled selected>Selecione o tipo</option>
        <option value="" style="color: blue;" disabled>ADMINISTRAÇÃO</option>
        <option value="1° Adm">1° Adm</option>
        <option value="2° Adm">2° Adm</option>
        <option value="3° Adm">3° Adm</option>
        <option value="" style="color: green;" disabled>AGRONEGÓCIO</option>
        <option value="3° Agro">3° Agro</option>
        <option value="" style="color: red;" disabled>DESENVOLVIMENTO DE SISTEMAS</option>
        <option value="1° Ds">1° Ds</option>
        <option value="2° Ds">2° Ds</option>
        <option value="3° Ds">3° Ds</option>
        <option value="" style="color: rgb(255, 66, 224);" disabled>ENFERMAGEM</option>
        <option value="1° Enfer">1° Enfer</option>
        <option value="2° Enfer">2° Enfer</option>
        <option value="3° Enfer">3° Enfer</option>
        <option value="" style="color: purple;" disabled>INFORMÁTICA</option>
        <option value="1° Infor">1° Infor</option>
        <option value="2° Infor">2° Infor</option>
        <option value="3° Infor">3° Infor</option>
        <option value="" style="color: black;" disabled>--- OUTRO ---</option>
        <option value="Outro">Outro</option>
      </select>
    </div>

    <button type="button" onclick="inicializarLocalizacao()" class="btn-location">
      📍 Usar minha localização
    </button>
  
    <div class="form-group">
      <label for="coordinates">Coordenadas: <br> Use pontos . (Ex: -12.34567, -45.67890)<br>(Latitude, Longitude) </label>
      <input id="latitude" type="number" step="any" placeholder="Latitude (-12.34567)" required />
      <input id="longitude" type="number" step="any" placeholder="Longitude (-45.67890)" required />
    </div>
  
    <div id="btns-login">
      <button type="submit" class="btn-submit" onclick="salvarArvore(event)">Enviar</button>
    </div>
  </form>
